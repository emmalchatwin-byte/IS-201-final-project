<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Snake Pro</title>
    <style>
        body {
            background-color: gray;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        #game-board {
            border: 4px solid #444;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            background-color: #000;
        }

        .stats {
            margin-bottom: 10px;
            text-align: center;
        }

        .btn-container {
            margin-top: 20px;
        }

        .btn {
            padding: 10px 20px;
            background-color: #2ecc71;
            color: black;
            text-decoration: none;
            font-weight: bold;
            border-radius: 3px;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #27ae60;
        }
        .navbar {
            width: 100%;
            background-color: #333;
            overflow: hidden;
            position: fixed; 
            top: 0;
            left: 0;
            display: flex;
            justify-content: center;
            z-index: 1000;
        }

        .navbar a {
            color: white;
            padding: 14px 20px;
            text-decoration: none;
            text-align: center;
            font-family: Arial, sans-serif;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        .navbar a:hover {
            background-color: #2ecc71; 
            color: black;
        }

        body {
            padding-top: 60px;
        }
    </style>
</head>
<body>

    <div class="stats">
        <h1>CLASSIC SNAKE GAME</h1>
        <h4>Use the arrow keys to move the green cube around the screen. Touch the red cube to earn points and make a snake.</h4>
        <p>Score: <span id="current-score">0</span> | High Score: <span id="high-score">0</span></p>
    </div>

    <div class="navbar">
        <a href="index.html">Home Page</a>
        <a href="resume.html">Resume</a> <a href="scratch.html">Travel</a>   </div>

    <canvas id="game-board" width="400" height="400"></canvas>

    

    <script>
        const canvas = document.getElementById("game-board");
        const ctx = canvas.getContext("2d");
        const scoreDoc = document.getElementById("current-score");
        const highDoc = document.getElementById("high-score");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let score = 0;
        let highScore = localStorage.getItem("snakeHighScore") || 0;
        highDoc.textContent = highScore;

        let snake = [{x: 10, y: 10}];
        let food = {x: 5, y: 5};
        let dx = 0;
        let dy = 0;
        let gameSpeed = 100;

        // Controls
        document.addEventListener("keydown", changeDirection);

        function changeDirection(event) {
            const LEFT_KEY = 37;
            const RIGHT_KEY = 39;
            const UP_KEY = 38;
            const DOWN_KEY = 40;

            const keyPressed = event.keyCode;
            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            if (keyPressed === LEFT_KEY && !goingRight) { dx = -1; dy = 0; }
            if (keyPressed === UP_KEY && !goingDown) { dx = 0; dy = -1; }
            if (keyPressed === RIGHT_KEY && !goingLeft) { dx = 1; dy = 0; }
            if (keyPressed === DOWN_KEY && !goingUp) { dx = 0; dy = 1; }
        }

        function drawGame() {
            updateSnake();
            
            if (checkGameOver()) {
                if (score > highScore) {
                    localStorage.setItem("snakeHighScore", score);
                }
                alert("Game Over! Score: " + score);
                resetGame();
                return;
            }

            clearCanvas();
            drawFood();
            drawSnake();
            
            setTimeout(drawGame, gameSpeed);
        }

        function updateSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            // Only move if a direction is set
            if (dx !== 0 || dy !== 0) {
                snake.unshift(head);
                if (head.x === food.x && head.y === food.y) {
                    score += 10;
                    scoreDoc.textContent = score;
                    // Increase speed slightly
                    if (gameSpeed > 50) gameSpeed -= 2;
                    createFood();
                } else {
                    snake.pop();
                }
            }
        }

        function checkGameOver() {
            if (dx === 0 && dy === 0) return false;

            // Wall collisions
            if (snake[0].x < 0 || snake[0].x >= tileCount || snake[0].y < 0 || snake[0].y >= tileCount) {
                return true;
            }

            // Self collisions
            for (let i = 1; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            return false;
        }

        function clearCanvas() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Subtle grid
            ctx.strokeStyle = "#111";
            for(let i=0; i<canvas.width; i+=gridSize) {
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke();
            }
        }

        function drawSnake() {
            ctx.fillStyle = "#2ecc71";
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#2ecc71";
            snake.forEach(part => {
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });
            ctx.shadowBlur = 0; // Reset blur for other elements
        }

        function drawFood() {
            ctx.fillStyle = "#e74c3c";
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
        }

        function createFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
        }

        function resetGame() {
            score = 0;
            scoreDoc.textContent = score;
            snake = [{x: 10, y: 10}];
            dx = 0;
            dy = 0;
            gameSpeed = 100;
            drawGame();
        }

        drawGame();
    </script>
</body>
</html>
